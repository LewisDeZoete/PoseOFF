# Feeder
feeder: feeders.ucf101.Feeder
feeder_args:
  data_paths: 
    1: ./data/ucf101/aligned_data/ucf101_01_D1.npz
    2: ./data/ucf101/aligned_data/ucf101_02_D1.npz
    3: ./data/ucf101/aligned_data/ucf101_03_D1.npz
  label_path: ./data/ucf101/statistics/ucf101_annotations.yaml
  p_interval: [0.5, 1]
  random_choose: False
  random_shift: False
  window_size: 100
  pad_method: zero_pad
  random_move: False
  random_rot: False
  average_flow: False # model_args.flow_channels = 2
  absolute_flow: False
    # window_mean:  # model_args.flow_channels = 1 if true, else 25 (for 5x5 window)
  no_flow: False
  no_Z: False # NOTE: Should ordinarily be false

extractor:
  data_paths: 
    rgb_path: ../Datasets/UCF-101/
    pose_path: ./data/ucf101/pose/
    flow_path: ./data/ucf101/flow/
    flowpose_path: ./data/ucf101/flowpose/
  preprocessed: True
  pose: 
    weights: pretrained_models/yolo11x-pose.pt
  flow:
    weights: pretrained_models/raft_large.pt
    imsize: [240,320]
    minibatch_size: 16
  flowpose:
    window_size: 5
    threshold: 0.05
    loop: False
    
# model
model: models.stgcn2.stgcn2.TEST_MODEL
model_args:
  num_class: 101
  num_point: 17
  num_person: 2
  graph: graph.yolo_pose.Graph
  pose_channels: 3
  flow_channels: 50
  base_channels: 64
  data_bn_type: 'MVC'
  ch_ratio: 2
  num_stages: 10
  inflate_stages: [5 8]
  down_stages: [5, 8]
  cnn: True
ignore_weights: []
phase: train
# weights: ./pretrained_models/kinetics_joint.pt


# Optimiser
optimiser: torch.optim.SGD
optim_params:
  lr: 0.1
  momentum: 0.9
  weight_decay: 0.0005
  nesterov: True

# Scheduler
scheduler: torch.optim.lr_scheduler.CosineAnnealingLR
scheduler_params:
  eta_min: 0


# training
training_function: training.train_msg3d.train_network
testing_function: training.eval_msg3d.eval_network
num_epoch: 16
device: 0
batch_size: 128
half: False

checkpoint_freq: 1 # how often to save the model and training state
save_location: ./results/stgcn2/ucf101/ # where to save the checkpoints
