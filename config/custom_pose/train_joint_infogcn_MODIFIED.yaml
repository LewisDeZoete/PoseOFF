feeder: feeders.feeder.Feeder
feeder_args:
  data_paths:
    rgb_path: ../Datasets/UCF-101/
    pose_path: ./data/UCF-101/pose/
    flow_path: ./data/UCF-101/flow/
    flowpose_path: ./data/UCF-101/flowpose/
  label_path: ../Datasets/UCF-101/ucf101_annotations.yaml
  modality: flowpose
  p_interval:
  - 0.5
  - 1
  split: train
  random_choose: true
  random_shift: true
  random_move: true
  random_rot: true
  window_size: 64
  preprocessed: true
extractor:
  preprocessed: true
  pose:
    weights: pretrained_models/yolo11x-pose.pt
  flow:
    weights: pretrained_models/raft_large.pt
    imsize:
    - 240
    - 320
    minibatch_size: 16
  flowpose:
    window_size: 5
    threshold: 0.05
    loop: false
model: model.infogcn2.sode.SODE
model_args:
  num_class: 101
  num_point: 17
  num_person: 2
  graph: graph.yolo_pose.Graph
  in_channels: 53
  num_head: 3
  ode_method: euler
  k: 8
  base_channel: 64
  depth: 4
  device: 0
  T: 64
  n_step: 3
  dilation: 1
  SAGC_proj: true
  backbone: transformer
  num_cls: 1
ignore_weights: []
phase: train
optim:
  base_lr: 0.5
  nesterov: true
  weight_decay: 0.0005
  step:
  - 10
  - 45
  gamma: 0.9
num_epoch: 100
device: 0
batch_size: 64
forward_batch_size: 64
test_batch_size: 256
checkpoint_freq: 10
save_location: ./results/infogcn2/
