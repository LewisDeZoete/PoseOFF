# dataloader
loader: lib.data.dataset.CustomVideoDataset
dataloader:
  data_path: ../Datasets/UCF-101/
  label_path: ../Datasets/UCF-101/ucf101_annotations.yaml
  debug: False
  preprocessed: True
  skel_path: ./data/UCF-101/pose/
  flow_path: ./data/UCF-101/flow/
  flowpose_path: ./data/UCF-101/flowpose/
  transforms:
    flow_sample: 
      kernel_size: 5
      threshold: 0.05
    

# model
model: model.msg3d.Model
model_args:
  num_class: 101
  num_point: 17
  num_person: 2
  num_gcn_scales: 8
  num_g3d_scales: 8
  graph: graph.yolo_pose.AdjMatrixGraph
  in_channels: 3
  flow_window: 5
  kernel_size: 3
  flow_channels: 4
ignore_weights: []
phase: train
save_location: ./results/ms-g3d_flow/
weights: 
# weights: ./pretrained_models/kinetics_joint.pt

optim:
  # weight_decay: 0.0005
  weight_decay: 0.0003
  base_lr: 0.5
  step: 10
  nesterov: True

# training
num_epoch: 1
# device: [0,1]
device: 0
# batch_size: 64
batch_size: 128
# forward_batch_size: 64
forward_batch_size: 128
# test_batch_size: 8
test_batch_size: 256
