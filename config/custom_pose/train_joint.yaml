# dataloader 
loader: lib.data.dataset.CustomVideoDataset
dataloader:
  data_path: ../Datasets/UCF-101/
  label_path: ../Datasets/UCF-101/ucf101_annotations.yaml
  debug: False
  preprocessed: True
  skel_path: ./data/UCF-101/pose/
  flow_path: ./data/UCF-101/flow/
  flowpose_path: ./data/UCF-101/flowpose/
  transforms:
    pose: 
      weights: pretrained_models/yolo11x-pose.pt
    flow:
      weights: pretrained_models/raft_large.pt
      imsize: [240,320]
      minibatch_size: 16
    flowpose:
      window_size: 5
      threshold: 0.05
      loop_graph: False
    

# model
model: model.msg3d.testModel
model_args:
  num_class: 101
  num_point: 17
  num_person: 2
  num_gcn_scales: 8
  num_g3d_scales: 8
  graph: graph.yolo_pose.AdjMatrixGraph
  in_channels: 3
  flow_window: 5 # must equal dataloader.transforms['flowpose']['window_size']
  kernel_size: 3
  flow_channels: 2
  conv: False
ignore_weights: []
phase: train
# weights: ./pretrained_models/kinetics_joint.pt

optim:
  base_lr: 0.5
  nesterov: True
  weight_decay: 0.0005
  # weight_decay: 0.0003
  # step: [45,55,80]
  # gamma: 0.1
  step: [10, 45]
  gamma: 0.90
  

# training
num_epoch: 100
device: 0
batch_size: 64
forward_batch_size: 64
test_batch_size: 256

checkpoint_freq: 10 # how often to save the model and training state
save_location: ./results/ms-g3d_flow/ # where to save the checkpoints