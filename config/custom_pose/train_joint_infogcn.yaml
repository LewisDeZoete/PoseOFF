# Feeder
feeder: feeders.feeder_yolo.Feeder
feeder_args:
  data_paths: 
    rgb_path: ../Datasets/UCF-101/
    pose_path: ./data/UCF-101/pose/
    flow_path: ./data/UCF-101/flow/
    flowpose_path: ./data/UCF-101/flowpose/
  label_path: ../Datasets/UCF-101/ucf101_annotations.yaml
  modality: flowpose
  p_interval: [0.5, 1]
  split: train
  random_choose: True
  random_shift: True
  random_move: True
  random_rot: True
  window_size: 64

# TODO: Ensure this extractor section doesn't break the extractors
# TODO: transforms are only for data_gen, move out of dataloader
extractor:
  preprocessed: True
  pose: 
    weights: pretrained_models/yolo11x-pose.pt
  flow:
    weights: pretrained_models/raft_large.pt
    imsize: [240,320]
    minibatch_size: 16
  flowpose:
    window_size: 5
    threshold: 0.05
    loop: False
    
# model
model: model.infogcn2.sode.SODE
model_args:
  num_class: 101
  num_point: 17
  num_person: 2
  graph: graph.yolo_pose.Graph
  in_channels: 3
  num_head: 3
  ode_method: euler
  k: 8
  base_channel: 64 # Hidden dimension
  depth: 4
  device: 0
  T: 64 # Maximum sequence length
  n_step: 3 # Number of ODE solver steps?
  dilation: 1
  SAGC_proj: True # Using self-attention graph convolution, (GCN if False)
  backbone: transformer
  num_cls: 1 # Not sure,
ignore_weights: []
phase: train
# weights: ./pretrained_models/kinetics_joint.pt

optim:
  base_lr: 0.5
  nesterov: True
  weight_decay: 0.0005
  # weight_decay: 0.0003
  # step: [45,55,80]
  # gamma: 0.1
  step: [10, 45]
  gamma: 0.90
  

# training
num_epoch: 100
device: 0
batch_size: 64
forward_batch_size: 64
test_batch_size: 256

checkpoint_freq: 10 # how often to save the model and training state
save_location: ./results/infogcn2/ # where to save the checkpoints