# Feeder
feeder: feeders.ntu_rgb_d.Feeder
feeder_args:
  data_paths: 
    CS: ./data/ntu/aligned_data/ntu_CS-flowpose_D3_aligned_mean.npz
    CV: ./data/ntu/aligned_data/ntu_CV-flowpose_D3_aligned_mean.npz
  label_path: ./data/ntu/statistics/ntu_rgbd-annotations.yaml
  p_interval: [0.5, 1]
  random_choose: True
  random_shift: True
  window_size: 64
  random_move: True
  random_rot: True
  average_flow: False # model_args.flow_channels = 2
  absolute_flow: False
    # window_mean:  # model_args.flow_channels = 1 if true, else 25 (for 5x5 window)
  no_flow: False
  no_Z: False
  normalisation: True

extractor:
  preprocessed: True
  pose: 
    weights: pretrained_models/yolo11x-pose.pt
  flow:
    weights: pretrained_models/raft_large.pt
    imsize: [1080,1920]
    minibatch_size: 3 # can be up to 16 for imsize: [240,320]
  flowpose:
    window_size: 5
    threshold: 0.05
    loop: False
    norm: False
    match_pose: False
    ntu: True
    dilation: 3
    
# model
model: models.infogcn2.sode.SODE
model_args:
  num_class: 60
  num_point: 25
  num_person: 2
  graph: graph.ntu_rgb_d.Graph
  pose_channels: 3
  flow_channels: 50 # (extractor.flowpose.window_size ** 2) * 2 eg. 9x9x2
  embed_channels: 64
  num_head: 3
  ode_method: euler
  depth: 4 # layers of attention heads
  device: 0
  T: 64 # Maximum sequence length
  n_step: 3 # Number of ODE solver steps
  SAGC_proj: True # Using self-attention graph convolution, (GCN if False)
  num_cls: 10 # Number of classification heads used
  n_sample: 1
  backbone: transformer
  cnn: True
  use_mask: True # If true, previous timesteps are masked from attention (default=true)
ignore_weights: []
phase: train
# weights: ./pretrained_models/kinetics_joint.pt

# Optimiser
optimiser: torch.optim.SGD
optim_params:
  lr: 0.1
  momentum: 0.9
  weight_decay: 0.0003
  nesterov: True
lambda_1: 1 # CLS loss (1 from paper)
lambda_2: 0.1 # Pred/recon loss (1e-1 from paper)
lambda_3: 0.001 # Feature loss (1e-3 from paper)
lambda_4: 0.0
lambda_5: 0.0

# Scheduler
scheduler: torch.optim.lr_scheduler.MultiStepLR
scheduler_params:
  milestones: [50, 60]
  gamma: 0.1

# training
training_function: training.train_infogcn.train_network
testing_function: training.eval_infogcn.eval_network
num_epoch: 70
device: 0
batch_size: 256
forward_batch_size: 128
test_batch_size: 256
half: False

checkpoint_freq: 10 # how often to save the model and training state
save_location: ./results/infogcn2/ntu/ # where to save the checkpoints
